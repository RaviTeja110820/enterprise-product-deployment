apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-app
  namespace: enterprise
spec:
  replicas: 2

  selector:
    matchLabels:
      app: enterprise-app

  template:
    metadata:
      labels:
        app: enterprise-app

    spec:
      containers:
      - name: enterprise-app

        image: 705557196379.dkr.ecr.ap-south-2.amazonaws.com/enterprise-app:v1

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 8080

          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8080

          initialDelaySeconds: 30
          periodSeconds: 15