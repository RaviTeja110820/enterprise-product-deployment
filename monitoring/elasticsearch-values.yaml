clusterName: "elasticsearch"

nodeGroup: "master"

replicas: 1

minimumMasterNodes: 1

esConfig:
  elasticsearch.yml: |
    discovery.type: single-node

resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "500m"
    memory: "1Gi"

volumeClaimTemplate:
  accessModes:
    - ReadWriteOnce

  storageClassName: gp2

  resources:
    requests:
      storage: 5Gi

protocol: https

createCert: true