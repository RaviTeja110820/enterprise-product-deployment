clusterName: "elasticsearch"

nodeGroup: "master"

replicas: 1

minimumMasterNodes: 1

clusterHealthCheckParams: "wait_for_status=yellow&timeout=5s"

esJavaOpts: "-Xms512m -Xmx512m"

resources:
  requests:
    cpu: "250m"
    memory: "1Gi"
  limits:
    cpu: "500m"
    memory: "1Gi"

volumeClaimTemplate:
  accessModes:
    - ReadWriteOnce

  storageClassName: gp2

  resources:
    requests:
      storage: 5Gi

protocol: https

createCert: true