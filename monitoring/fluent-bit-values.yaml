kind: DaemonSet

serviceAccount:
  create: true

config:
  service: |
    [SERVICE]
        Flush           1
        Daemon          Off
        Log_Level       info
        Parsers_File    parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

  outputs: |
    [OUTPUT]
        Name              es
        Match             kube.*
        Host              elasticsearch-master.logging.svc.cluster.local
        Port              9200
        HTTP_User         elastic
        HTTP_Passwd       YBTKXkRk7znnC9y7
        TLS               On
        TLS.Verify        Off
        Logstash_Format   On
        Logstash_Prefix   kubernetes
        Suppress_Type_Name On
        Generate_ID        On

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 250m
    memory: 256Mi